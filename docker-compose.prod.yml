# Sentinel Production — Docker Compose
# Usage:
#   sops -d secrets/secrets.prod.enc.env > .env.prod
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d

services:
  # ── Database ────────────────────────────────────────────────────────
  sentinel-db:
    image: postgres:16-alpine
    container_name: sentinel_prod_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sentinel
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - sentinel_prod_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel -d sentinel"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentinel_net

  # ── Redis ───────────────────────────────────────────────────────────
  sentinel-redis:
    image: redis:7-alpine
    container_name: sentinel_prod_redis
    restart: unless-stopped
    volumes:
      - sentinel_prod_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sentinel_net

  # ── Backend (FastAPI) ───────────────────────────────────────────────
  sentinel-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel_prod_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://sentinel:${POSTGRES_PASSWORD}@sentinel-db:5432/sentinel
      USE_DATABASE: "true"
      USE_CELERY: "true"
      REDIS_URL: redis://sentinel-redis:6379/0
      CELERY_BROKER_URL: redis://sentinel-redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CORS_ORIGINS: https://sentinel.appliedaccountability.com
      ENVIRONMENT: production
      GEOCODING_API_ENABLED: ${GEOCODING_API_ENABLED:-false}
    depends_on:
      sentinel-db:
        condition: service_healthy
      sentinel-redis:
        condition: service_healthy
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --workers 2
    networks:
      - sentinel_net

  # ── Celery Workers ──────────────────────────────────────────────────
  sentinel-celery-default:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel_prod_celery_default
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://sentinel:${POSTGRES_PASSWORD}@sentinel-db:5432/sentinel
      REDIS_URL: redis://sentinel-redis:6379/0
      CELERY_BROKER_URL: redis://sentinel-redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ENVIRONMENT: production
    depends_on:
      sentinel-db:
        condition: service_healthy
      sentinel-redis:
        condition: service_healthy
    command: celery -A backend.celery_app worker --loglevel=info --queues=default,enrichment --concurrency=2 -n worker-default@%h
    networks:
      - sentinel_net

  sentinel-celery-extraction:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel_prod_celery_extraction
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://sentinel:${POSTGRES_PASSWORD}@sentinel-db:5432/sentinel
      REDIS_URL: redis://sentinel-redis:6379/0
      CELERY_BROKER_URL: redis://sentinel-redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ENVIRONMENT: production
    depends_on:
      sentinel-db:
        condition: service_healthy
      sentinel-redis:
        condition: service_healthy
    command: celery -A backend.celery_app worker --loglevel=info --queues=extraction --concurrency=1 -n worker-extraction@%h
    networks:
      - sentinel_net

  sentinel-celery-fetch:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel_prod_celery_fetch
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://sentinel:${POSTGRES_PASSWORD}@sentinel-db:5432/sentinel
      REDIS_URL: redis://sentinel-redis:6379/0
      CELERY_BROKER_URL: redis://sentinel-redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ENVIRONMENT: production
    depends_on:
      sentinel-db:
        condition: service_healthy
      sentinel-redis:
        condition: service_healthy
    command: celery -A backend.celery_app worker --loglevel=info --queues=fetch --concurrency=2 -n worker-fetch@%h
    networks:
      - sentinel_net

  sentinel-celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel_prod_celery_beat
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://sentinel:${POSTGRES_PASSWORD}@sentinel-db:5432/sentinel
      REDIS_URL: redis://sentinel-redis:6379/0
      CELERY_BROKER_URL: redis://sentinel-redis:6379/0
      ENVIRONMENT: production
    depends_on:
      sentinel-redis:
        condition: service_healthy
    command: celery -A backend.celery_app beat --loglevel=info
    networks:
      - sentinel_net

  # ── Nginx (static files + reverse proxy) ────────────────────────────
  sentinel-nginx:
    build:
      context: .
      dockerfile: frontend/Dockerfile.prod
    container_name: sentinel_prod_nginx
    restart: unless-stopped
    ports:
      - "8580:80"
    depends_on:
      - sentinel-backend
    networks:
      - sentinel_net

  # ── Cloudflare Tunnel ───────────────────────────────────────────────
  sentinel-cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: sentinel_prod_cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - sentinel-nginx
    networks:
      - sentinel_net

volumes:
  sentinel_prod_data:
  sentinel_prod_redis:

networks:
  sentinel_net:
    name: sentinel_net
